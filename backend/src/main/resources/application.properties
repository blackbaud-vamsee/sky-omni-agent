spring.application.name=sky-omni-agent
server.port=9494

# ============================================================
# LLM PROVIDER — GitHub Models API (via GitHub Copilot access)
#
# HOW TO GET YOUR TOKEN:
#   1. Go to: github.com → Settings → Developer Settings → Personal Access Tokens → Tokens (classic)
#   2. Generate token with scope: models:read
#   3. Set env var:  export GITHUB_TOKEN=github_pat_...
#      OR replace REPLACE_WITH_YOUR_GITHUB_PAT below (do NOT commit)
#
# ALTERNATIVE — Blackbaud bai-genai service:
#   Replace base-url with your internal Azure OpenAI endpoint
#   Replace api-key with the bai-genai key
#   Change model-name to whichever model bai-genai exposes
# ============================================================

# Streaming model (used by ArchitectAgent + MedicAgent via Flux<String>)
langchain4j.open-ai.streaming-chat-model.base-url=https://models.inference.ai.azure.com
langchain4j.open-ai.streaming-chat-model.api-key=${GITHUB_TOKEN:REPLACE_WITH_YOUR_GITHUB_PAT}
langchain4j.open-ai.streaming-chat-model.model-name=gpt-4o
langchain4j.open-ai.streaming-chat-model.max-tokens=4096
langchain4j.open-ai.streaming-chat-model.temperature=0.3
langchain4j.open-ai.streaming-chat-model.log-requests=true
langchain4j.open-ai.streaming-chat-model.log-responses=false

# Non-streaming fallback
langchain4j.open-ai.chat-model.base-url=https://models.inference.ai.azure.com
langchain4j.open-ai.chat-model.api-key=${GITHUB_TOKEN:REPLACE_WITH_YOUR_GITHUB_PAT}
langchain4j.open-ai.chat-model.model-name=gpt-4o
langchain4j.open-ai.chat-model.max-tokens=4096
langchain4j.open-ai.chat-model.temperature=0.3

# ============================================================
# Async / SSE timeout — allow long streaming responses
# ============================================================
spring.mvc.async.request-timeout=180000

# Virtual threads: requires Java 21 — disabled for Java 17 compatibility
# spring.threads.virtual.enabled=true

# ============================================================
# Logging
# ============================================================
logging.level.dev.langchain4j=DEBUG
logging.level.com.blackbaud.skyomni=INFO
